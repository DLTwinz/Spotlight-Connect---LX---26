<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Spotlight Connect Launch">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Spotlight Connect">
  <title>Spotlight Connect</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    var script = document.createElement('script');
    script.src = "https://webrtc.github.io/adapter/adapter-latest.js";
    
    script.onload = function() {
      var flutterBootstrap = document.createElement('script');
      flutterBootstrap.src = "flutter_bootstrap.js";
      flutterBootstrap.async = true;
      document.body.appendChild(flutterBootstrap);
    };
    
    document.head.appendChild(script);
  </script>
</body>
</html>
